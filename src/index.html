<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIN AI Terminal | Quantum Assistant</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
  <canvas id="matrix-bg"></canvas>
  <div class="container">
    <div class="header">
      <span class="logo">☠️ BIN.AI</span>
      <span class="status">QUANTUM LINK ACTIVE</span>
    </div>
    <div class="chat-window" id="chat-window">
      <div class="message bot">
        <div class="avatar bot-avatar">⚡</div>
        <div class="bubble">Sistem terhubung. Siap menerima perintah, Yang Mulia.</div>
      </div>
    </div>
    <div class="input-area">
      <input type="text" id="user-input" placeholder="Ketik perintah..." autofocus>
      <button id="send-btn">⏎</button>
    </div>
  </div>
  <div class="loading" id="loading">⏳</div>
  <script src="script.js"></script>
</body>
</html>
